spring.application.name=backend

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (defina JWT_SECRET no Render com string longa e aleatória; mínimo ~32 caracteres para HS256)
app.jwt.secret=${JWT_SECRET:erp-dev-secret-change-in-production-min-32-chars!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS: origens separadas por vírgula (frontend Vercel + Vite local)
app.cors.allowed-origins=${ERP_CORS_ORIGINS:http://localhost:5173,https://erp-six-omega.vercel.app}

# Bootstrap — primeiro usuário (admin) sem inserir senha em texto puro no banco
# Opção A (recomendada em deploy): POST público /auth/bootstrap com JSON { nome, email, username?, password }
# Opção B (opcional): na subida, se a tabela usuario estiver vazia e BOOTSTRAP_ADMIN_PASSWORD estiver definida:
app.bootstrap.auto-create-on-startup=${BOOTSTRAP_AUTO_CREATE:false}
app.bootstrap.admin-email=${BOOTSTRAP_ADMIN_EMAIL:admin@erp.local}
app.bootstrap.admin-username=${BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap.admin-name=${BOOTSTRAP_ADMIN_NAME:Administrador}
# Defina no ambiente (Render): senha com no mínimo 6 caracteres. Se vazia, nenhum usuário é criado na inicialização.
app.bootstrap.admin-password=${BOOTSTRAP_ADMIN_PASSWORD:}
