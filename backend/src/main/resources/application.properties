spring.application.name=backend

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (defina JWT_SECRET no Render com string longa e aleatória; mínimo ~32 caracteres para HS256)
app.jwt.secret=${JWT_SECRET:erp-dev-secret-change-in-production-min-32-chars!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS: origens separadas por vírgula (frontend Vercel + Vite local)
app.cors.allowed-origins=${ERP_CORS_ORIGINS:http://localhost:5173,https://erp-six-omega.vercel.app}
